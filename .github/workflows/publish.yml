name: Publish to npm

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release (idempotent)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      # Sync package.json version with git tag (e.g. v1.2.3 -> 1.2.3)
      - run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Syncing package.json version to $TAG_VERSION"
          jq --arg v "$TAG_VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      # Also sync VERSION constant in usage.mjs
      - run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/const VERSION = '.*'/const VERSION = '${TAG_VERSION}'/" usage.mjs
          bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Idempotent: skip if version already published
      - name: Publish to npm (skip if already exists)
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if npm view "cc-third-party-usage@$TAG_VERSION" version 2>/dev/null; then
            echo "⚠️  cc-third-party-usage@$TAG_VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

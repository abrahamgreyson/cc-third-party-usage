# .gitlab-ci.yml - GitLab CI/CD configuration

stages:
  - test
  - publish

variables:
  # 使用国内 npm 镜像加速
  NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
  # 防止 npm install 时的问题
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_AUDIT_LEVEL: "moderate"

test:
  stage: test
  image: oven/bun:alpine
  cache:
    paths:
      - node_modules/
  before_script:
    - bun --version
  script:
    - bun install
    - bun test
  only:
    - branches
    - tags

publish:
  stage: publish
  image: oven/bun:alpine
  cache:
    paths:
      - node_modules/
  before_script:
    - bun --version
    # 发布时使用官方 npm registry
    - bun pm set -g npmRegistryUrl https://registry.npmjs.org/
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - bun run build
    - bun publish --dry-run
    # 确认无误后取消下面的注释来真正发布
    # - bun publish
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - test
